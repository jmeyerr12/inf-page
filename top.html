<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Bombardiro Crocodilo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root{
      --bg:#0b0b10;
      --fg:#eaeaea;
      --accent:#35e6a6;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial,sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, #10131a 10%, #0b0b10 60%), var(--bg);
      color:var(--fg);
      line-height:1.4;
      min-height:100svh;
      display:flex;
      flex-direction:column;
      gap:24px;
      padding:24px;
    }
    h1{
      margin:0;
      font-size:clamp(1.2rem,2.5vw,2rem);
      letter-spacing:.5px;
      display:flex;
      align-items:center;
      gap:.5rem;
      position:relative;
      z-index:2;
    }
    .wrap{
      display:grid;
      grid-template-columns:1fr;
      gap:20px;
      align-items:start;
      position:relative;
      z-index:2;
    }
    .player{
      width: min(100%, 720px);
      aspect-ratio: 16/9;
      border:0;
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }

    /* Camada de bolhas pela tela toda */
    .sky{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:3;
      overflow:hidden;
    }
    .bubble{
      position:fixed;
      left: calc(var(--sx, 50) * 1vw / 100 * 100);
      top:  calc(var(--sy, 50) * 1vh / 100 * 100);
      width: clamp(56px, var(--size, 90px), 128px);
      aspect-ratio: 1/1;
      transform: translate(-50%, -50%);
      border-radius:50%;
      display:grid;
      place-items:center;
      box-shadow:
        0 8px 18px rgba(0,0,0,.35),
        inset 0 0 0 2px rgba(255,255,255,.06);
      background: radial-gradient(120% 120% at 30% 30%, rgba(255,255,255,.12), rgba(255,255,255,.02) 60%, rgba(0,0,0,.1) 100%);
      will-change: transform;
      --ax: 12vw;
      --ay: 10vh;
      --drift: 16s;
      --delay: 0s;
      animation: wander var(--drift) ease-in-out var(--delay) infinite alternate;
    }
    .ring{
      position:relative;
      width:100%;
      height:100%;
      border-radius:50%;
      overflow:hidden;
      animation: spin var(--rot, 14s) linear infinite;
    }
    .ring::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:50%;
      outline:2px solid rgba(255,255,255,.06);
    }
    .bubble img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      filter: saturate(1.05) contrast(1.02);
    }
    .tag{
      position:absolute;
      bottom:-4px;
      left:50%;
      transform:translateX(-50%);
      font-size:.72rem;
      background:rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.12);
      padding:.15rem .5rem;
      border-radius:999px;
      white-space:nowrap;
      backdrop-filter: blur(4px);
      pointer-events:none;
      user-select:none;
    }

    @keyframes spin{ to{ transform: rotate(360deg); } }
    @keyframes wander{
      0%   { transform: translate(-50%, -50%) translate( 0, 0) scale(1.00); }
      25%  { transform: translate(-50%, -50%) translate( var(--ax), calc(var(--ay) * -0.8)) scale(1.06); }
      50%  { transform: translate(-50%, -50%) translate( calc(var(--ax) * -0.6), var(--ay)) scale(0.94); }
      75%  { transform: translate(-50%, -50%) translate( calc(var(--ax) * 0.4), calc(var(--ay) * 0.5)) scale(1.08); }
      100% { transform: translate(-50%, -50%) translate( calc(var(--ax) * -1), calc(var(--ay) * -1)) scale(0.98); }
    }
    @media (prefers-reduced-motion: reduce){
      .bubble { animation: none; }
      .ring   { animation: none; }
    }

    /* Etiqueta/balão com link (canto inferior direito) */
    .corner-badge{
      position:fixed;
      right:16px;
      bottom:16px;
      z-index:4;
      background:#10b981; /* verde */
      color:#031a12;
      text-decoration:none;
      font-weight:700;
      padding:.6rem .9rem;
      border-radius:14px;
      box-shadow: 0 10px 24px rgba(0,0,0,.35);
      display:inline-flex;
      align-items:center;
      gap:.5rem;
    }
    .corner-badge::after{
      content:"";
      position:absolute;
      right:14px; bottom:-10px;
      width:0; height:0;
      border-left:10px solid transparent;
      border-right:10px solid transparent;
      border-top:10px solid #10b981; /* rabinho do balão */
      filter: drop-shadow(0 3px 2px rgba(0,0,0,.25));
    }
    .corner-badge:hover{ filter: brightness(1.05); transform: translateY(-1px); }

    /* Cartão da frase (texto preto) */
    .fortune{
      position:fixed;
      left:16px;
      bottom:16px;
      z-index:4;
      background:#ffffff;
      color:#000000;           /* texto preto */
      border:1px solid #e9e9e9;
      padding:.65rem .8rem;
      border-radius:12px;
      max-width:min(90vw, 440px);
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
      font-size:.95rem;
    }
    .fortune b{ font-weight:700; }
  </style>
</head>

  <script>
  // --- Frase de biscoito (mantida) ---
  const frases = [
    "A sorte favorece quem se prepara.",
    "Pequenos passos constroem grandes jornadas.",
    "Hoje é um bom dia para começar algo novo.",
    "Confie no processo, colha os frutos.",
    "Você é mais forte do que imagina.",
    "Oportunidades aparecem para quem está atento.",
    "Respire fundo e siga adiante.",
    "O impossível é só o possível que ninguém tentou.",
    "A consistência vence o talento distraído.",
    "Boas ideias pedem execução.",
    "É vuqui vuqui, vuqui, vuqui na onda maluca.",
    "Voce é mais louco que todos nós.",
    "Calma vida, ta de boa"
  ];
  document.getElementById("fortuneText").textContent =
    frases[Math.floor(Math.random()*frases.length)];

  // --- Posicionador: garante posições únicas (em %) para cada .bubble ---
  (function placeUnique(){
    const bubbles = Array.from(document.querySelectorAll('.bubble'));
    const n = bubbles.length;

    if (!n) return;

    // Margem nas bordas (em % da viewport) para não cortar
    const margin = 8; // 8% em cada lado

    // Define uma grade "quase quadrada"
    const cols = Math.ceil(Math.sqrt(n));
    const rows = Math.ceil(n / cols);

    // Tamanho de cada célula (em % da viewport)
    const usableW = 100 - 2*margin;
    const usableH = 100 - 2*margin;
    const cellW = usableW / cols;
    const cellH = usableH / rows;

    // Índices de células embaralhados
    const idxs = Array.from({length:n}, (_,i)=>i).sort(()=>Math.random()-0.5);

    for (let k = 0; k < n; k++){
      const i = idxs[k];
      const r = Math.floor(i / cols);
      const c = i % cols;

      // Centro da célula em %
      let sx = margin + (c + 0.5) * cellW;
      let sy = margin + (r + 0.5) * cellH;

      // “Jitter” (aleatório pequeno) para não parecer grade rígida
      const jx = (Math.random() - 0.5) * cellW * 0.4; // até 40% da célula
      const jy = (Math.random)() - 0.5 ? (Math.random() - 0.5) * cellH * 0.4 : 0;

      sx = Math.max(margin, Math.min(100 - margin, sx + jx));
      sy = Math.max(margin, Math.min(100 - margin, sy + jy));

      // Aplique nas CSS variables que seu CSS já usa
      bubbles[k].style.setProperty('--sx', sx.toFixed(2));
      bubbles[k].style.setProperty('--sy', sy.toFixed(2));

      // Opcional: variar levemente o "drift" para cada bolha
      const drift = (12 + Math.random()*8).toFixed(2) + 's';
      const delay = (-Math.random()*3).toFixed(2) + 's';
      const ax = (8 + Math.random()*8).toFixed(2) + 'vw';
      const ay = (7 + Math.random()*7).toFixed(2) + 'vh';
      bubbles[k].style.setProperty('--drift', drift);
      bubbles[k].style.setProperty('--delay', delay);
      bubbles[k].style.setProperty('--ax', ax);
      bubbles[k].style.setProperty('--ay', ay);
    }
  })();
</script>
